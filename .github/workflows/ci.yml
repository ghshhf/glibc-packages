name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Install node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: ssi/package-lock.json

      - name: Install dependencies (ssi/)
        working-directory: ssi
        run: npm ci

      - name: Run SSI tests
        working-directory: ssi
        run: npx vitest run

      - name: Install dependencies (browser-runtime/)
        working-directory: browser-runtime
        run: npm ci

      - name: Run browser-runtime tests
        working-directory: browser-runtime
        run: npx vitest run

      - name: Type check SSI modules
        working-directory: ssi
        run: npx tsc --noEmit
