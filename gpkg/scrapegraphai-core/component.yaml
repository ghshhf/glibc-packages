# =============================================================================
# scrapegraphai-core 组件/插件清单
# =============================================================================
# 这是从 ScrapeGraphAI SmartScraperGraph 提取的核心爬虫能力组件。
# =============================================================================

component:
  name: "scrapegraphai-core"
  version: "2.1.3"
  type: "plugin"
  category: "scraping"
  homepage: "https://scrapegraphai.com/"
  license: "MIT"
  maintainer: "@ghshhf"

  description: >
    AI 驱动核心爬虫引擎。从 ScrapeGraphAI SmartScraperGraph
    提取的精简版，仅依赖 requests + beautifulsoup4 + openai，
    不含 Playwright 等重型浏览器依赖。

  # ── 核心能力 ──
  capabilities:
    smart_scraper:
      description: "智能单页抓取 — 用自然语言从网页提取结构化信息"
      inputs: ["url", "prompt"]
      outputs: ["json"]
      example: >
        ai-scrape https://news.ycombinator.com "提取前10篇文章的标题和链接"

    multi_model:
      description: "支持多种 LLM 后端（OpenAI / Ollama / DeepSeek / Groq）"
      models:
        - "openai/gpt-4o"
        - "openai/gpt-4o-mini"
        - "ollama/llama3.2"
        - "deepseek/deepseek-chat"
        - "groq/llama-70b"

    map_reduce:
      description: "长页面自动分块 + map-reduce 合并，突破 token 限制"

  # ── 对外接口 ──
  interfaces:
    cli:
      entry: "ai-scrape"
      usage: "ai-scrape <url> <prompt> [options]"

    python:
      entry_point: "ai_scrape.SmartScraper"
      example: |
        from ai_scrape import SmartScraper
        scraper = SmartScraper(model="openai/gpt-4o-mini")
        result = scraper.run("https://example.com", "提取标题")

    build:
      hooks:
        - "termux_step_pre_configure"
        - "termux_step_configure"
        - "termux_step_make"
        - "termux_step_make_install"
        - "termux_step_post_make_install"

  # ── 组件依赖 ──
  dependencies:
    required:
      - name: "python-glibc"
        version: ">=3.8"
      - name: "python-pip"
    runtime_python:
      - "requests"
      - "beautifulsoup4"
      - "openai"
      - "tiktoken"
    suggested:
      - name: "scrapegraphai"
        description: "全量爬虫库，提供 Playwright 浏览器抓取等增强功能"
      - name: "ollama-glibc"
        description: "本地 LLM 推理引擎"

  # ── 与全量版的对比 ──
  comparison:
    vs_scrapegraphai_full:
      lighter: true
      no_browser: true
      no_graph_complexity: true
      same_prompt_engineering: true
      reason: >
        核心提取逻辑相同（fetch → parse → LLM extract），
        但去掉了 Playwright 浏览器、图执行引擎、多管道变体等重型依赖。
        适用场景：静态页面、API 友好的内容、不需要 JS 渲染的页面。

  # ── 生命周期 ──
  lifecycle:
    install: "pip install requests beautifulsoup4 openai tiktoken"
    deploy: "cp src/ai_scrape.py → <prefix>/lib/scrapegraphai-core/"
    cli: "ln -s ai_scrape.py → <prefix>/bin/ai-scrape"
    test: |
      python -c "from ai_scrape import SmartScraper; print('core scraper: ok')"

# ============================================================================
# 组件依赖链
# ============================================================================
# glibc-packages 生态中的爬虫组件族:
#
#   [python-glibc] ← [python-pip]
#        ↓                    ↓
#   [scrapegraphai-core]  [scrapegraphai]（全量，可选）
#   （轻量，无浏览器）      （完整，含 Playwright）
#        ↓
#   共享相同的提示词工程（ScrapeGraphAI 的核心秘密武器）
