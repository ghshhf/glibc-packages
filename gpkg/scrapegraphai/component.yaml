# =============================================================================
# scrapegraphai 组件/插件清单
# =============================================================================
# 这是 scrapegraphai 作为 glibc-packages 生态中一个标准组件的声明文件。
# 定义了该组件的能力、接口、依赖和用法。
# =============================================================================

component:
  # ── 基础信息 ──
  name: "scrapegraphai"
  version: "2.1.3"
  type: "plugin"                    # plugin = 可插拔组件，可独立运行也可嵌入系统
  category: "scraping"            # 功能分类：爬虫/数据采集
  homepage: "https://scrapegraphai.com/"
  license: "MIT"
  maintainer: "@ghshhf"

  # ── 核心能力声明 ──
  # 该组件向系统提供了哪些能力
  capabilities:
    - smart_scraper:                # 单页智能抓取
      description: "基于自然语言提示的智能单页抓取"
      inputs: ["url", "prompt"]
      outputs: ["json"]

    - search_and_scrape:            # 搜索+抓取
      description: "搜索引擎结果 → 多页面抓取"
      inputs: ["query", "count"]
      outputs: ["json"]

    - batch_scrape:                 # 批量抓取
      description: "多 URL 批量抓取（支持 OpenAI Batch API）"
      inputs: ["urls[]", "prompt"]
      outputs: ["json"]

    - speech_output:                # 语音输出
      description: "抓取内容 → 音频生成"
      inputs: ["url", "prompt"]
      outputs: ["audio"]

    - script_generation:            # 脚本生成
      description: "抓取逻辑 → Python 爬虫脚本"
      inputs: ["url", "prompt"]
      outputs: ["python_script"]

  # ── 运行时接口 ──
  # 该组件对外暴露的 Python API
  interfaces:
    python:
      entry_point: "scrapegraphai.graphs"
      classes:
        - "SmartScraperGraph"       # 单页抓取
        - "SearchGraph"             # 搜索+抓取
        - "SpeechGraph"             # 语音输出
        - "ScriptCreatorGraph"      # 脚本生成
        - "SmartScraperMultiGraph"  # 多页抓取

    # 构建系统接口（build.sh 提供的 hook）
    build:
      - "termux_step_pre_configure"    # 环境准备
      - "termux_step_configure"        # 配置
      - "termux_step_make"             # 编译
      - "termux_step_make_install"     # 安装（核心）
      - "termux_step_post_make_install" # 后处理

  # ── 组件间依赖 ──
  # 本组件依赖的其他 gpkg 组件
  dependencies:
    required:
      - "python-glibc"
      - "python-pip"

    suggested:
      - name: "ollama-glibc"
        description: "本地 LLM 推理引擎，支持 Ollama 模型"
      - name: "playwright-browsers"
        description: "浏览器引擎，用于 JS 渲染页面抓取"

  # ── 生命周期 ──
  lifecycle:
    build: "pip install ."
    install: "pip install . --prefix=<target>"
    post_install: "python -m playwright install chromium  # 可选"
    test: |
      python -c "
      from scrapegraphai.graphs import SmartScraperGraph
      print('[scrapegraphai] 组件加载正常')
      "

# =============================================================================
# 组件图例
# =============================================================================
# glibc-packages 生态:
#
#   [python-glibc] ← [python-pip] ← [scrapegraphai]
#                                        ↓
#                              [ollama-glibc] ← 可选本地推理
#                              [playwright]   ← 可选浏览器
#
#   scrapegraphai 既可以：
#   - 作为 gpkg 组件被构建系统管理（跨平台分发）
#   - 作为独立 Python 包被 pip 直接安装（脱离系统使用）
